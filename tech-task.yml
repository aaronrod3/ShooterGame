name: "Technical Task"
description: "Engine wiring, system architecture, refactor, or optimization"
title: "[TECH] "
labels: ["tech-debt"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - Player Input System
        - Health / Damage System
        - Weapon System
        - Animation / ABP
        - AI / Behavior Tree
        - Networking / RPC
        - Save / Load / Persistence
        - Physics / Movement
        - Performance / Optimization
        - Code Architecture / Refactor
        - Build / CI
        - Other
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: "Target Milestone"
      options:
        - Pre-Production Refresh
        - First Playable Wave Loop
        - Core Mission Systems
        - Alpha - Feature Complete
        - Beta - Content and Balance
        - Release Candidate
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: "What needs to be done"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: "Why / Context"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Done When"
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
